name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run Rust tests
        run: cargo test --locked

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci

      - name: Build UI
        env:
          VITE_BASE_PATH: /
          VITE_BUILD_ID: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.run_id }}
        run: npm run build
